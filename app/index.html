<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Cartozome</title>

    <link rel="icon" type="image/png" href="./img/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <header id="top-banner">
      <div id="banner-left">
        <img src="./img/logo.png" alt="Logo Cartozome" id="banner-logo">
        <h1>CARTOZOME</h1>
      </div>
      <img src="./img/leonberard.png" alt="Logo Centre Léon Bérard" id="banner-logo-right">
    </header>

    <div id="main-container">
      <aside id="side-panel">

        <!-- ================================ -->
        <!-- ADRESSES -->
        <!-- ================================ -->
        <div class="category">
          <div class="category-header">
            <button class="category-toggle">
              <span class="cat-icon">📍</span>
              <span class="cat-title">Adresses</span>
            </button>
          </div>
          <div class="category-layers">

            <!-- Sous-catégorie : Point unique -->
            <div class="subcategory">
              <div class="subcategory-header">
                <button class="subcategory-toggle" id="point-subcategory-toggle" data-target="point-subcategory-layers">
                  Point unique 
                  <span class="chevron">▾</span>
                </button>
              </div>
              <div class="subcategory-layers hidden" id="point-subcategory-layers">
                <div class="layer-item">
                  <label for="point-start">Adresse :</label>
                  <div class="input-and-button">
                    <input type="text" id="point-start" placeholder="Ex: 10 rue de la République, Lyon">
                    <button type="button" id="geolocate-point" title="Utiliser ma position">📍</button>
                  </div>
                </div>
              </div>
            </div>

            <!-- Sous-catégorie : Itinéraire -->
            <div class="subcategory">
              <div class="subcategory-header">
                <button class="subcategory-toggle" id="route-subcategory-toggle" data-target="route-subcategory-layers">
                  Itinéraire
                  <span class="chevron">▾</span>
                </button>
              </div>
              <div class="subcategory-layers hidden" id="route-subcategory-layers">
                <div class="layer-item">
                  <label for="route-start">De :</label>
                  <div class="input-and-button">
                    <input type="text" id="route-start" placeholder="Ex: 10 rue de la République, Lyon">
                    <button type="button" id="geolocate-start" title="Utiliser ma position">📍</button>
                  </div>
                </div>
                <div class="layer-item">
                  <label for="route-end">Vers :</label>
                  <div class="input-and-button">
                    <input type="text" id="route-end" placeholder="Ex: 25 rue Victor Hugo, Lyon">
                    <button type="button" id="geolocate-end" title="Utiliser ma position">📍</button>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>

        <!-- ================================ -->
        <!-- Pollution de l'air -->
        <!-- ================================ -->
        <div class="category">
          <div class="category-header">
            <button class="category-toggle" data-target="cat-air">
              <span class="cat-icon"><img src="./img/air.png" alt="Logo Air"></span>
              <span class="cat-title">Pollution de l'air</span>
              <span class="chevron">▾</span>
            </button>
            <button class="category-info-btn" data-cat="cat-air" title="En savoir plus">ℹ️</button>
          </div>
          <div class="category-layers hidden" id="cat-air">
            <div class="layer-item">
              <label><input type="checkbox" class="layer-checkbox" data-layer="cartozome:mod_aura_2024_pm10_moyan">PM10</label>
            </div>
            <div class="layer-item">
              <label><input type="checkbox" class="layer-checkbox" data-layer="cartozome:mod_aura_2024_pm25_moyan">PM2,5</label>
            </div>
            <div class="layer-item">
              <label><input type="checkbox" class="layer-checkbox" data-layer="cartozome:mod_aura_2024_o3_somo35">O3</label>
            </div>
            <div class="layer-item">
              <label><input type="checkbox" class="layer-checkbox" data-layer="cartozome:mod_aura_2024_no2_moyan">NO2</label>
            </div>
          </div>
        </div>

        <!-- ================================ -->
        <!-- Pollen -->
        <!-- ================================ -->
        <div class="category">
          <div class="category-header">
            <button class="category-toggle" data-target="cat-pollen">
              <span class="cat-icon"><img src="./img/pollen.png" alt="Logo Pollen"></span>
              <span class="cat-title">Pollen</span>
              <span class="chevron">▾</span>
            </button>
            <button class="category-info-btn" data-cat="cat-pollen" title="En savoir plus">ℹ️</button>
          </div>
          <div class="category-layers hidden" id="cat-pollen">
            <div class="layer-item">
              <label><input type="checkbox" class="layer-checkbox" data-layer="cartozome:Ambroisie_2024_AURA">Ambroisie</label>
            </div>
          </div>
        </div>

        <!-- ================================ -->
        <!-- Bruit -->
        <!-- ================================ -->
        <div class="category">
          <div class="category-header">
            <button class="category-toggle" data-target="cat-bruit">
              <span class="cat-icon"><img src="./img/bruit.png" alt="Logo Bruit"></span>
              <span class="cat-title">Bruit</span>
              <span class="chevron">▾</span>
            </button>
            <button class="category-info-btn" data-cat="cat-bruit" title="En savoir plus">ℹ️</button>
          </div>
          <div class="category-layers hidden" id="cat-bruit">

            <!-- Journée -->
            <div class="subcategory">
              <div class="subcategory-header">
                <button class="subcategory-toggle" id="bruit-jour-toggle" data-target="bruit-jour">Journée
                  <span class="chevron">▾</span>
                </button>
              </div>
              <div class="subcategory-layers hidden" id="bruit-jour">
                <div class="layer-item"><label><input type="checkbox" class="layer-checkbox" data-layer="cartozome:GL_Rte_Lden">Routier</label></div>
                <div class="layer-item"><label><input type="checkbox" class="layer-checkbox" data-layer="cartozome:GL_Fer_Lden">Ferroviaire</label></div>
                <div class="layer-item"><label><input type="checkbox" class="layer-checkbox" data-layer="cartozome:Indus_GL_E4_Lden">Industriel</label></div>
                <div class="layer-item"><label><input type="checkbox" class="layer-checkbox" data-layer="cartozome:metropole-de-lyon_noi_carto_bruit.noiaerien2022_lden" data-type="wfs">Aérien</label></div>
              </div>
            </div>

            <!-- Nuit -->
            <div class="subcategory">
              <div class="subcategory-header">
                <button class="subcategory-toggle" id="bruit-nuit-toggle" data-target="bruit-nuit">Nuit
                  <span class="chevron">▾</span>
                </button>
              </div>
              <div class="subcategory-layers hidden" id="bruit-nuit">
                <div class="layer-item"><label><input type="checkbox" class="layer-checkbox" data-layer="cartozome:GL_Rte_Ln">Routier</label></div>
                <div class="layer-item"><label><input type="checkbox" class="layer-checkbox" data-layer="cartozome:GL_Fer_Ln">Ferroviaire</label></div>
                <div class="layer-item"><label><input type="checkbox" class="layer-checkbox" data-layer="cartozome:metropole-de-lyon_noi_carto_bruit.noiaerien2022_ln" data-type="wfs">Aérien</label></div>
              </div>
            </div>

          </div>
        </div>

        <!-- ================================ -->
        <!-- UV -->
        <!-- ================================ -->
        <div class="category">
          <div class="category-header">
            <button class="category-toggle" data-target="cat-uv">
              <span class="cat-icon"><img src="./img/uv.png" alt="Logo UV"></span>
              <span class="cat-title">UV</span>
              <span class="chevron">▾</span>
            </button>
            <button class="category-info-btn" data-cat="cat-uv" title="En savoir plus">ℹ️</button>
          </div>
          <div class="category-layers hidden" id="cat-uv">
            <div class="layer-item">
              <label><input type="checkbox" class="layer-checkbox" data-layer="cartozome:uv_index">Index UV</label>
            </div>
          </div>
        </div>

        <!-- ================================ -->
        <!-- BOUTON CALCUL EXPOSOME -->
        <!-- ================================ -->
        <div class="category">
          <button id="calc-exposome-btn">Calculer l'exposome</button>
        </div>

      </aside>

      <div id="map"></div>
    </div>

    <!-- POP-UP DE BIENVENUE -->
    <div id="welcome-overlay" class="visible">
      <div id="welcome-popup">
        <button id="welcome-close">✖</button>
        <h2>Bienvenue sur Cartozome</h2>
        <p>Cette carte vous permet de visualiser la pollution de l'air, le pollen et le bruit dans votre région.</p>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
